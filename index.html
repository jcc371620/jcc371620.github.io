<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessy Chen | Persoanl Space</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --dora-blue: #00a0e9;   
            --dora-red: #e53935;    
            --dora-yellow: #ffca28; 
            --bg-silver: #f8f9fa;   
            --text-dark: #34495e;   
            --text-gray: #7f8c8d;
            --border-blue: rgba(0, 160, 233, 0.1);
        }
        
        @keyframes doorOpen {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            background: var(--bg-silver); 
            color: var(--text-dark); 
            font-family: 'ZCOOL KuaiLe', "PingFang SC", "Microsoft YaHei", sans-serif; 
            line-height: 1.6; 
            padding: 60px 24px 120px; 
            max-width: 900px; 
            margin: 0 auto; 
            animation: doorOpen 0.8s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center; /* 全局居中 */
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部竹蜻蜓动态线条 */
        .top-propeller {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--dora-blue), var(--dora-yellow), var(--dora-blue), transparent);
            background-size: 200% 100%;
            animation: movePropeller 2.5s infinite linear;
            z-index: 1000;
        }
        @keyframes movePropeller {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 居中导航 */
        nav { margin-bottom: 60px; display: flex; gap: 40px; justify-content: center; }
        nav a { text-decoration: none; font-size: 14px; color: var(--text-gray); transition: 0.3s; }
        nav a:hover { color: var(--dora-blue); transform: scale(1.1); }

        /* Hero 区域居中 */
        .hero { margin-bottom: 80px; text-align: center; }
        h1 { font-size: 48px; font-weight: 400; margin: 0; letter-spacing: 2px; }
        
        .red-collar { 
            width: 120px; height: 6px; background: var(--dora-red); 
            margin: 24px auto; border-radius: 10px; position: relative;
        }
        .bell {
            position: absolute; right: -18px; top: -6px; width: 18px; height: 18px; 
            background: var(--dora-yellow); border-radius: 50%; 
            box-shadow: 0 0 12px rgba(255,202,40,0.7);
            cursor: pointer;
        }
        .bell:hover { animation: ring 0.5s infinite; }
        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-20deg); }
        }
        .hero-desc { font-size: 19px; color: var(--text-gray); max-width: 600px; margin: 0 auto; }

        .section-title { 
            font-size: 15px; text-transform: uppercase; letter-spacing: 3px; 
            color: var(--dora-blue); margin-bottom: 30px; display: block;
            text-align: center;
        }

        /* 个人切片居中展示 */
        .hobby-grid { 
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; 
            margin-bottom: 100px; width: 100%;
        }
        .hobby-card {
            background: #fff; padding: 12px 24px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px; font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s;
            border: 1px solid transparent;
        }
        .hobby-card:hover { 
            transform: translateY(-5px) rotate(2deg); 
            border-color: var(--dora-blue);
            box-shadow: 0 8px 20px rgba(0,160,233,0.1);
        }

        /* 专业百宝袋容器：浅蓝色背景 + 虚线边框 */
        .pocket-container {
            background: rgba(0, 160, 233, 0.04); /* 淡淡的蓝 */
            padding: 80px 45px;
            border-radius: 40px 40px 200px 200px; 
            border: 2.5px dashed rgba(0, 160, 233, 0.1); /* 缝制感 */
            width: 100%;
            box-sizing: border-box;
        }

        /* 项目网格 */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            text-align: left; /* 保持内部文字左对齐，增加可读性 */
        }
        
        .pocket-card {
            background: #ffffff; /* 纯白卡片，从蓝色口袋里弹出 */
            padding: 30px; border-radius: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; color: inherit;
            box-shadow: 0 6px 15px rgba(0,0,0,0.02);
            border: 1px solid transparent;
        }
        .pocket-card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 160, 233, 0.1);
            border-color: var(--dora-blue);
        }
        
        .sub-tag { font-size: 10px; color: var(--dora-blue); font-weight: bold; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        h4 { margin: 0 0 12px 0; font-size: 22px; color: #2c3e50; }
        .pocket-card p { margin: 0; font-size: 14.5px; color: var(--text-gray); line-height: 1.7; }
        
        .tags { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { 
            font-size: 11px; color: #95a5a6; background: #f8f9fa; 
            padding: 4px 10px; border-radius: 6px; 
        }
        .pocket-card:hover .tag { background: rgba(0,160,233,0.08); color: var(--dora-blue); }

        .footer { 
            margin-top: 120px; padding: 40px 0; width: 100%;
            border-top: 2px dashed #eee; font-size: 14px; color: var(--text-gray); 
            display: flex; justify-content: space-between; 
            align-items: center;
        }

        @media (max-width: 768px) { 
            .grid { grid-template-columns: 1fr; }
            .pocket-container { border-radius: 30px 30px 100px 100px; padding: 50px 20px; }
            h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

    <div class="top-propeller"></div>

    <nav id="main-nav"></nav>

    <header class="hero">
        <h1>陈诗洁 | Jessy Chen</h1>
        <div class="red-collar">
            <div class="bell" title="叮当~"></div>
        </div>
        <p class="hero-desc">竹蜻蜓执照 | Quality Assurance | Business Analyst. <br>致力于构建如“时光机”般可靠的自动化工程方案，一起让梦想起飞吧！</p>
    </header>

    <section style="width: 100%;">
        <span class="section-title">Life Slice / 生活切片</span>
        <div class="hobby-grid">
            <div class="hobby-card"><span>🏸</span> 羽毛球</div>
            <div class="hobby-card"><span>📷</span> 摄影</div>
            <div class="hobby-card"><span>📚</span> 漫画</div>
            <div class="hobby-card"><span>🛸</span> 梦想家</div>
        </div>
    </section>

    <section class="pocket-container">
        <span class="section-title">Professional Pocket / 专业百宝袋</span>
        <div id="project-list" class="grid"></div>
    </section>

    <footer class="footer">
        <div>© 2026 Jessy Chen.</div>
        <div style="color: var(--dora-red); font-weight: bold;">叮当~ 梦想成真</div>
    </footer>

    <script>
        const projects = [
            { title: "自动化测试工程", sub: "QUALITY ASSURANCE", desc: "把重复劳动交给脚本，像时光机一样精准回溯逻辑 Bug。", tags: ["Python", "Playwright"], url: "#" },
            { title: "接口自动化与性能", sub: "PERFORMANCE", desc: "探究数据流动的奥秘，确保 API 像竹蜻蜓一样平稳起飞。", tags: ["Requests", "JMeter"], url: "#" },
            { title: "DevOps 流水线建设", sub: "CI/CD", desc: "打造全自动的任意门，让代码一键直达生产环境。", tags: ["GitHub Actions", "Docker"], url: "#" },
            { title: "数据分析与可视化", sub: "BUSINESS INTEL", desc: "在繁杂的数据里寻找宝藏，绘制业务增长的秘密地图。", tags: ["SQL", "Power BI"], url: "#" },
            { title: "Salesforce 系统管理", sub: "CRM SYSTEM", desc: "优化云端逻辑，让 CRM 系统像百宝袋一样无所能。", tags: ["Salesforce", "SOQL"], url: "#" },
            { title: "业务流程架构设计", sub: "WORKFLOW", desc: "梳理复杂的协作链路，输出清晰如漫画般的业务流程。", tags: ["BPMN 2.0", "Xmind"], url: "#" },
            { title: "交互设计与原型工程", sub: "UX/UI DESIGN", desc: "用 Figma 勾勒梦想，打造有温度的交互体验。", tags: ["Figma", "Axure"], url: "#" },
            { title: "质量工程策略咨询", sub: "STRATEGY", desc: "从源头预防风险，为项目交付保驾护航。", tags: ["Agile", "Consulting"], url: "#" }
        ];

        document.getElementById('project-list').innerHTML = projects.map(p => `
            <a href="${p.url}" class="pocket-card">
                <span class="sub-tag">${p.sub}</span>
                <h4>${p.title}</h4>
                <p>${p.desc}</p>
                <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </a>
        `).join('');

        const navLinks = [
            { name: "HOME", url: "#" },
            { name: "GITHUB", url: "https://github.com/jcc371620", target: "_blank" },
            { name: "CONTACT", url: "mailto:your-email@example.com" } 
        ];
        document.getElementById('main-nav').innerHTML = navLinks.map(n => `<a href="${n.url}" ${n.target ? `target="${n.target}"`: ""}>${n.name}</a>`).join('');
    </script>
</body>
</html>
