<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessy Chen | BA & QA Portfolio</title>
    <style>
        :root {
            --dora-blue: #00a0e9;   
            --dora-red: #e53935;    
            --dora-yellow: #ffca28; 
            --bg-silver: #f8f9fa;   
            --text-dark: #2c3e50;   
            --text-gray: #95a5a6;
            --border-light: rgba(0, 160, 233, 0.1);
        }
        
        body { 
            background: var(--bg-silver); 
            color: var(--text-dark); 
            font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; 
            line-height: 1.6; 
            padding: 80px 24px; 
            max-width: 850px; 
            margin: 0 auto; 
            -webkit-font-smoothing: antialiased;
            position: relative; /* 为绝对定位的图标提供参考 */
        }

        /* 极简导航 */
        nav { margin-bottom: 80px; display: flex; gap: 40px; }
        nav a { 
            text-decoration: none; font-size: 13px; color: var(--text-gray); 
            font-weight: 600; transition: 0.3s; letter-spacing: 1px;
        }
        nav a:hover { color: var(--dora-blue); }

        /* 英雄区 */
        .hero { margin-bottom: 80px; }
        h1 { font-size: 42px; font-weight: 700; margin: 0; letter-spacing: -1px; }
        .red-collar { 
            width: 80px; height: 4px; background: var(--dora-red); 
            margin: 15px 0 25px 0; border-radius: 2px; position: relative;
        }
        .red-collar::after {
            content: ''; position: absolute; right: -15px; top: -3px; width: 10px; height: 10px; 
            background: var(--dora-yellow); border-radius: 50%; box-shadow: 0 0 8px rgba(255,202,40,0.6);
        }
        .hero-desc { font-size: 17px; color: var(--text-gray); max-width: 600px; }

        .section-title { 
            font-size: 13px; text-transform: uppercase; letter-spacing: 2px; 
            color: var(--dora-blue); margin: 60px 0 24px 0; font-weight: 700;
        }

        /* 爱好展示区 */
        .hobby-grid { display: flex; gap: 16px; flex-wrap: wrap; }
        .hobby-card {
            background: #fff;
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }
        .hobby-card:hover {
            border-color: var(--dora-blue);
            transform: rotate(-2deg) scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 160, 233, 0.1);
        }
        .hobby-card span { font-size: 20px; }

        /* 项目网格 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        .pocket-card {
            background: #ffffff;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .pocket-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 12px 30px rgba(0, 160, 233, 0.06); 
            border-color: var(--dora-blue);
        }
        
        .pocket-card .sub-tag { 
            font-size: 11px; color: var(--text-gray); font-weight: 700; 
            margin-bottom: 8px; display: block; letter-spacing: 1px;
        }
        .pocket-card h4 { margin: 0 0 12px 0; font-size: 19px; }
        .pocket-card p { margin: 0; font-size: 14px; color: var(--text-gray); line-height: 1.7; }
        
        /* 优化后的 Tag 样式 */
        .tags { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { 
            font-size: 12px; 
            letter-spacing: 0.3px; 
            color: var(--dora-blue); 
            background: rgba(0,160,233,0.05); 
            padding: 4px 12px; 
            border-radius: 6px; 
            font-weight: 600; 
            border: 1px solid rgba(0,160,233,0.1);
            transition: 0.2s;
        }
        .pocket-card:hover .tag {
            background: rgba(0,160,233,0.1);
        }

        .footer { 
            margin-top: 100px; padding: 40px 0; border-top: 1px solid #eee; 
            font-size: 12px; color: var(--text-gray); display: flex; justify-content: space-between; 
            align-items: center; /* 垂直居中页脚内容 */
        }

        /* 融入的极简哆啦A梦图标 */
        .dora-icon {
            position: absolute;
            bottom: 30px; /* 距离底部 30px */
            right: 30px; /* 距离右侧 30px */
            width: 40px; /* 图标宽度 */
            height: 40px; /* 图标高度 */
            opacity: 0.1; /* 极低的透明度，使其像隐形水印 */
            transition: opacity 0.3s ease; /* 悬停时的渐变效果 */
        }
        .dora-icon:hover {
            opacity: 0.3; /* 悬停时稍微清晰一点 */
        }

        @media (max-width: 700px) { 
            .grid { grid-template-columns: 1fr; }
            h1 { font-size: 32px; }
            .dora-icon { bottom: 20px; right: 20px; width: 30px; height: 30px; } /* 移动端图标缩小 */
        }
    </style>
</head>
<body>

    <nav id="main-nav"></nav>

    <header class="hero">
        <h1>陈诗洁 | Jessy Chen</h1>
        <div class="red-collar"></div>
        <p class="hero-desc">白日梦想家 | Quality Assurance & Business Analyst. <br>致力于构建如“时光机”般可靠的自动化工程方案与业务逻辑闭环。</p>
    </header>

    <section>
        <h2 class="section-title">Life Slice / 生活切片</h2>
        <div class="hobby-grid">
            <div class="hobby-card"><span>🏸</span> 羽毛球</div>
            <div class="hobby-card"><span>📷</span> 摄影</div>
            <div class="hobby-card"><span>📚</span> 漫画</div>
            <div class="hobby-card"><span>🛸</span> 梦想家</div>
        </div>
    </section>

    <section>
        <h2 class="section-title">Professional Pocket / 专业百宝袋</h2>
        <div id="project-list" class="grid"></div>
    </section>

    <footer class="footer">
        <div>© 2026 Jessy Chen. Built with Dora-Minimalism Spirit.</div>
        <div style="color: var(--dora-red); font-weight: bold;">叮当~ 未来已来</div>
    </footer>

    <img src="path/to/your/minimalist-doraemon-icon.svg" alt="Doraemon Icon" class="dora-icon">

    <script>
        const projects = [
            { 
                title: "自动化测试工程", sub: "QA", 
                desc: "基于 Pytest 与 Playwright 封装 Page Object 模型，实现高复用性端到端回归测试，确保复杂业务逻辑在持续集成中的稳定性。", 
                tags: ["Python", "Pytest", "Playwright"], 
                url: "https://github.com/jcc371620/Automation-Projects" 
            },
            { 
                title: "接口自动化与性能", sub: "Perf", 
                desc: "利用 Requests 库构建接口测试组件，覆盖 API 核心路径校验；通过性能压测评估响应阈值，在后端链路预判逻辑风险。", 
                tags: ["Requests", "Postman", "JMeter"], url: "#" 
            },
            { 
                title: "DevOps 流水线建设", sub: "CI/CD", 
                desc: "配置 GitHub Actions 自动化工作流，集成静态代码扫描与自动测试触发，优化部署反馈周期，打造透明化的质量流水线。", 
                tags: ["GitHub Actions", "Docker", "Azure"], url: "#" 
            },
            { 
                title: "数据分析与可视化", sub: "BI", 
                desc: "通过 SQL 进行多表关联挖掘，利用 Power BI 构建销售 KPI 动态监控看板，将底层明细转化为支撑业务决策的直观洞察。", 
                tags: ["SQL", "Power BI", "Tableau"], url: "#" 
            },
            { 
                title: "Salesforce 系统管理", sub: "CRM", 
                desc: "主导 Sales & Marketing Cloud 的配置优化，利用 SOQL 进行跨对象数据提取，实现 Consumer Cloud 环境下 O2O 渠道全生命周期数据整合。", 
                tags: ["Sales Cloud", "Marketing Cloud", "Consumer Cloud", "SOQL"], url: "#" 
            },
            { 
                title: "业务流程架构设计", sub: "Workflow", 
                desc: "运用 BPMN 2.0 标准梳理跨部门协作链路，输出高标准化流程图与需求规格文档，消除业务传递中的逻辑冗余与理解偏差。", 
                tags: ["Visio", "Xmind", "BPMN 2.0"], url: "#" 
            },
            { 
                title: "交互设计与原型工程", sub: "UX/UI", 
                desc: "遵循 Ant Design 规范，利用 Figma 产出高保真交互原型，通过原型走通复杂业务用例，大幅降低前后端开发的沟通成本。", 
                tags: ["Figma", "Axure", "Sketch"], url: "#" 
            },
            { 
                title: "质量工程策略咨询", sub: "Strategy", 
                desc: "基于敏捷开发模式制定分层测试方案，通过风险识别与测试左移策略，在需求阶段介入质量预防，实现项目交付成本的最优化。", 
                tags: ["Risk Analysis", "Agile", "Consulting"], url: "#" 
            }
        ];

        document.getElementById('project-list').innerHTML = projects.map(p => `
            <a href="${p.url}" class="pocket-card" ${p.url.startsWith('http') ? 'target="_blank"' : ''}>
                <span class="sub-tag">${p.sub}</span>
                <h4>${p.title}</h4>
                <p>${p.desc}</p>
                <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </a>
        `).join('');

        const navLinks = [
            { name: "HOME", url: "index.html" },
            { name: "GITHUB", url: "https://github.com/jcc371620", target: "_blank" },
            { name: "LINKEDIN", url: "#" },
            { name: "CONTACT", url: "mailto:your-email@example.com" } 
        ];
        document.getElementById('main-nav').innerHTML = navLinks.map(n => `<a href="${n.url}" ${n.target ? `target="${n.target}"`: ""}>${n.name}</a>`).join('');
    </script>
</body>
</html>
