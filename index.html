<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCC | Personal Space</title>
    <style>
        /* 基础样式保持黑白 */
        body {
            background-color: #000;
            color: #fff;
            font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            padding: 60px 20px;
            max-width: 750px;
            margin: 0 auto;
        }
        
        /* 导航栏链接样式 */
        nav { margin-bottom: 40px; }
        nav a {
            margin-right: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            color: #888;
            transition: 0.3s;
        }
        nav a:hover { color: #fff; }

        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 0; }
        .subtitle { color: #666; margin-bottom: 40px; }

        /* 内容区超链接 */
        .content a {
            color: #fff;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        .content a:hover { color: #888; }

        /* 项目卡片 - 让整个卡片可以点击 */
        .project-card {
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .project-card:hover {
            border-color: #fff;
            background-color: #111;
            transform: translateY(-2px);
        }
        .project-card h4 { margin: 0 0 5px 0; }
        .project-card p { margin: 0; font-size: 0.85rem; color: #888; }

        .footer { margin-top: 80px; font-size: 0.8rem; color: #444; border-top: 1px solid #222; padding-top: 20px; }
    </style>
</head>
