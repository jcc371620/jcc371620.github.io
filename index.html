<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijie Chen | Personal Space</title>
    <style>
        :root {
            --bg: #0d1117;          /* 深蓝黑背景，接近 GitHub 暗色 */
            --text: #c9d1d9;        /* 浅灰文字，不刺眼 */
            --gray: #8b949e;
            --dark-gray: #30363d;
            --accent: #00ff41;      /* 经典荧光绿 (黑客帝国绿) */
            --accent-dim: rgba(0, 255, 65, 0.1);
            --border: #21262d;      /* 卡片边框 */
        }
        
        /* 全局基础：增加类似终端的打字机字体 */
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: "Fira Code", "Courier New", monospace; /* 优先使用等宽字体 */
            line-height: 1.6; 
            padding: 60px 20px; 
            max-width: 750px; 
            margin: 0 auto; 
        }

        /* 导航栏：霓虹效果 */
        nav { margin-bottom: 40px; border-bottom: 1px solid var(--dark-gray); padding-bottom: 20px; }
        nav a { margin-right: 20px; text-decoration: none; font-size: 0.9rem; color: var(--gray); transition: 0.3s; }
        nav a:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); } /* 霓虹发光 */

        /* 标题：加粗，荧光绿 */
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .subtitle { color: var(--gray); margin-bottom: 40px; font-size: 0.8rem; opacity: 0.7; }
        
        h3 { margin-top: 40px; border-bottom: 1px solid var(--dark-gray); padding-bottom: 10px; color: var(--accent); }

        /* 项目卡片：模拟终端窗口 */
        .project-card { 
            display: block; 
            padding: 24px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border); 
            background: rgba(13, 17, 23, 0.8); /* 半透明背景 */
            transition: 0.3s; 
            cursor: pointer; 
            text-decoration: none; 
            color: inherit; 
            position: relative;
        }
        
        /* 悬停：卡片霓虹发光 */
        .project-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent); 
            box-shadow: 0 0 20px var(--accent-dim); 
        }

        .project-card h4 { margin: 0 0 8px 0; font-size: 1.2rem; color: var(--text); }
        .project-card h4 small { color: var(--gray); font-weight: normal; margin-left: 5px; font-size: 0.8rem; }
        .project-card p { margin: 0; font-size: 0.85rem; color: var(--gray); }
        
        /* 标签：代码高亮风格 */
        .tag-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { 
            font-size: 10px; 
            color: var(--accent); 
            background: var(--accent-dim); /* 淡淡的荧光背景 */
            padding: 2px 10px; 
            border: 1px solid var(--accent); 
            text-transform: uppercase; 
            border-radius: 2px;
        }

        .footer { margin-top: 80px; font-size: 0.8rem; color: #444; border-top: 1px solid var(--border); padding-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <nav id="main-nav"></nav>
    ... (剩余HTML和JS不变)
</body>
</html>
