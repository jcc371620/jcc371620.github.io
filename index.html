<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessy Chen | Time Machine Space</title>
    <style>
        :root {
            --dora-blue: #00a0e9;   /* 经典蓝 */
            --dora-red: #e53935;    /* 丝带红 */
            --dora-yellow: #ffca28; /* 铃铛金 */
            --bg-silver: #f8f9fa;   /* 极浅灰底，增加高级感 */
            --text-dark: #2c3e50;
        }
        
        body { 
            background: var(--bg-silver); 
            color: var(--text-dark); 
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; 
            line-height: 1.6; 
            padding: 60px 24px; 
            max-width: 800px; 
            margin: 0 auto; 
        }

        /* 顶部极其简约的导航 */
        nav { margin-bottom: 80px; display: flex; gap: 40px; }
        nav a { 
            text-decoration: none; 
            font-size: 14px; 
            color: #95a5a6; 
            font-weight: 500; 
            transition: 0.3s;
            position: relative;
        }
        nav a:hover { color: var(--dora-blue); }
        nav a:hover::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--dora-blue);
        }

        /* 英雄区：名字下方那条“红领巾”是灵魂 */
        .hero { margin-bottom: 100px; }
        h1 { 
            font-size: 42px; 
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -1px; 
        }
        .red-collar { 
            width: 80px; 
            height: 4px; 
            background: var(--dora-red); 
            margin: 15px 0 25px 0; 
            border-radius: 2px;
            position: relative;
        }
        /* 铃铛点缀：微小的金色圆点 */
        .red-collar::after {
            content: ''; position: absolute; right: -15px; top: -3px; width: 10px; height: 10px; 
            background: var(--dora-yellow); border-radius: 50%; box-shadow: 0 0 5px rgba(255,202,40,0.5);
        }
        .hero-desc { font-size: 17px; color: #7f8c8d; max-width: 500px; }

        /* 卡片设计：去掉粗边框，改为极细的蓝色侧边或线条 */
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 30px; color: var(--dora-blue); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .pocket-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(0, 160, 233, 0.1);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            overflow: hidden;
        }
        /* 悬停效果：左侧出现蓝色竖条 */
        .pocket-card::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; 
            background: var(--dora-blue); transition: 0.3s;
        }
        .pocket-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }
        .pocket-card:hover::before { width: 4px; }

        .pocket-card h4 { margin: 0 0 10px 0; font-size: 18px; color: var(--text-dark); }
        .pocket-card p { margin: 0; font-size: 14px; color: #95a5a6; line-height: 1.6; }
        
        .tags { margin-top: 15px; }
        .tag { 
            font-size: 11px; color: var(--dora-blue); background: rgba(0,160,233,0.05); 
            padding: 2px 8px; border-radius: 4px; margin-right: 5px; font-weight: 600;
        }

        .footer { 
            margin-top: 120px; padding-top: 30px; border-top: 1px solid #eee; 
            font-size: 12px; color: #bdc3c7; display: flex; justify-content: space-between; 
        }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav id="main-nav"></nav>

    <header class="hero">
        <h1>陈诗洁 Jessy Chen</h1>
        <div class="red-collar"></div>
        <p class="hero-desc">PwC AC | Quality Assurance & Business Analyst. <br>专注于构建如“时光机”般可靠的自动化方案与业务逻辑。</p>
    </header>

    <section style="margin-bottom: 80px;">
        <h2 class="section-title">核心领域 / Core Domains</h2>
        <div class="grid">
            <div class="pocket-card">
                <h4>自动化测试</h4>
                <p>利用 Playwright 等百宝袋工具，确保业务逻辑在持续集成中稳如泰山。</p>
            </div>
            <div class="pocket-card">
                <h4>业务需求分析</h4>
                <p>穿透复杂的原始需求，交付最直接有效的解决方案。</p>
            </div>
        </div>
    </section>

    <section>
        <h2 class="section-title">精选项目 / Projects</h2>
        <div id="project-list" class="grid"></div>
    </section>

    <footer class="footer">
        <div>© 2026 Jessy Chen. Dora-Inspired Minimalism.</div>
        <div>叮当~ 未来已来</div>
    </footer>

    <script>
        const projects = [
            { title: "Salesforce CRM 系统管理", sub: "BA", desc: "优化客户全生命周期逻辑，实现数据流的“任意门”式无缝集成。", tags: ["Salesforce", "SOQL"], url: "#" },
            { title: "自动化测试工程", sub: "QA", desc: "构建高效回归框架，让 Bug 无处遁形。", tags: ["Python", "Playwright"], url: "https://github.com/jcc371620/Automation-Projects" },
            { title: "数据可视化看板", sub: "BI", desc: "将晦涩的数字转化为直观的业务洞察。", tags: ["Power BI", "SQL"], url: "#" },
            { title: "业务流程架构设计", sub: "Workflow", desc: "通过科学建模消除流程中的冗余时间。", tags: ["BPMN", "Visio"], url: "#" }
        ];

        document.getElementById('project-list').innerHTML = projects.map(p => `
            <a href="${p.url}" class="pocket-card" ${p.url.startsWith('http') ? 'target="_blank"' : ''}>
                <div style="font-size: 11px; color: #bdc3c7; margin-bottom: 5px;">${p.sub}</div>
                <h4>${p.title}</h4>
                <p>${p.desc}</p>
                <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </a>
        `).join('');

        const navLinks = [
            { name: "首页", url: "index.html" },
            { name: "GitHub", url: "https://github.com/jcc371620", target: "_blank" },
            { name: "领英", url: "#" },
            { name: "联系我", url: "mailto:jcc371620@gmail.com" }
        ];
        document.getElementById('main-nav').innerHTML = navLinks.map(n => `<a href="${n.url}" ${n.target ? `target="${n.target}"`: ""}>${n.name}</a>`).join('');
    </script>
</body>
</html>
