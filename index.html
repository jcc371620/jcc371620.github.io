<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijie Chen | Personal Space</title>
    <style>
        :root {
            --bg: #ffffff;        /* 纯白背景 */
            --text: #1a1a1a;      /* 深灰黑色，比纯黑更柔和 */
            --light-gray: #f5f5f7; /* 浅灰底色（苹果风） */
            --border: #e5e5e5;    /* 细边框颜色 */
            --secondary: #6e6e73; /* 辅助文字颜色 */
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.5; 
            padding: 80px 24px; 
            max-width: 680px; 
            margin: 0 auto; 
            -webkit-font-smoothing: antialiased; /* 字体抗锯齿优化 */
        }

        /* 导航栏：极简灰 */
        nav { margin-bottom: 60px; }
        nav a { margin-right: 24px; text-decoration: none; font-size: 13px; color: var(--secondary); transition: color 0.2s; font-weight: 500; }
        nav a:hover { color: var(--text); }

        /* 标题：增加字间距，沉稳大气 */
        h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .subtitle { color: var(--secondary); margin-bottom: 48px; font-size: 14px; font-weight: 400; }
        
        h3 { margin-top: 64px; margin-bottom: 24px; font-size: 18px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 12px; }

        /* 项目卡片：去掉边框，改用悬停阴影或背景色 */
        .project-card { 
            display: block; 
            padding: 20px 0; 
            margin-bottom: 8px; 
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease; 
            cursor: pointer; 
            text-decoration: none; 
            color: inherit; 
        }
        
        .project-card:hover { 
            padding-left: 8px; /* 轻微位移感 */
            background: #fafafa;
        }

        .project-card h4 { margin: 0 0 6px 0; font-size: 16px; font-weight: 600; }
        .project-card h4 small { color: var(--secondary); font-weight: 400; margin-left: 8px; font-size: 12px; }
        .project-card p { margin: 0; font-size: 14px; color: var(--secondary); }
        
        /* 标签：低调的浅灰色块 */
        .tag-container { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { 
            font-size: 10px; 
            color: var(--secondary); 
            background: var(--light-gray); 
            padding: 2px 8px; 
            border-radius: 4px;
            font-weight: 500;
        }

        .footer { margin-top: 100px; font-size: 12px; color: #b0b0b0; text-align: left; }
    </style>
</head>
<body>

    <nav id="main-nav"></nav>

    <h1>陈诗洁 | Jessy Chen</h1>
    <p class="subtitle">Shanghai | PwC AC | Quality Assurance | Business Analyst</p>
    <p style="font-size: 15px; color: #333;">作为 BA 与 QA 专家，我致力于通过数据驱动的分析与自动化的测试方案提升业务价值。</p>
    
    <h3 id="projects">Selected Projects</h3>
    <div id="project-list"></div>

    <div class="footer">© 2026 Jessy Chen. Designed for simplicity.</div>

    <script>
        // 数据部分保持不变，逻辑依然是数据驱动
        const projects = [
            { title: "Salesforce 业务管理", sub: "CRM", desc: "基于 Salesforce 生态的客户关系管理方案，涵盖 O2O 全渠道数据整合。", tags: ["CRM", "Sales Cloud"], url: "#" },
            { title: "自动化测试框架", sub: "Automation", desc: "基于 Python 的端到端自动化方案，显著提升回归测试效率。", tags: ["Python", "Playwright"], url: "https://github.com/jcc371620/Automation-Projects" },
            { title: "Power BI 销量看板", sub: "BI", desc: "针对快消行业销量的多维数据可视化看板。", tags: ["DAX", "SQL"], url: "#" },
            { title: "Tableau 交互监控", sub: "Data Viz", desc: "构建实时监控仪表板，辅助管理层通过视觉分析决策。", tags: ["Analytics", "Tableau"], url: "#" },
            { title: "业务流程建模", sub: "BPM", desc: "基于 BPMN 2.0 标准的跨部门协作流程图设计。", tags: ["Visio", "BPMN"], url: "#" }
        ];

        document.getElementById('project-list').innerHTML = projects.map(p => `
            <a href="${p.url}" class="project-card" ${p.url.startsWith('http') ? 'target="_blank"' : ''}>
                <h4>${p.title} <small>/ ${p.sub}</small></h4>
                <p>${p.desc}</p>
                <div class="tag-container">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </a>
        `).join('');

        const navLinks = [
            { name: "Home", url: "index.html" },
            { name: "GitHub", url: "https://github.com/jcc371620", target: "_blank" },
            { name: "Email", url: "mailto:jcc371620@gmail.com" },
            { name: "Phone", url: "tel:+8617701690962" }
        ];
        document.getElementById('main-nav').innerHTML = navLinks.map(n => `<a href="${n.url}" ${n.target ? `target="${n.target}"`: ""}>${n.name}</a>`).join('');
    </script>
</body>
</html>
